# Configuration file for Mega-Linter
# See all available variables at https://oxsecurity.github.io/megalinter/configuration/ and in linters documentation

APPLY_FIXES: all # all, none, or list of linter keys
DEFAULT_BRANCH: main # Usually master or main
# ENABLE: # If you use ENABLE variable, all other languages/formats/tooling-formats will be disabled by default
# ENABLE_LINTERS: # If you use ENABLE_LINTERS variable, all other linters will be disabled by default
DISABLE_LINTERS:
  [
    DART_DARTANALYZER,
    CPP_CPPLINT,
    C_CPPLINT,
    GROOVY_NPM_GROOVY_LINT,
    HTML_DJLINT,
    KOTLIN_KTLINT,
    REPOSITORY_KICS,
    REPOSITORY_DEVSKIM,
    KOTLIN_DETEKT,
  ]
DISABLE:
  - COPYPASTE # Comment to disable checks of abusive copy-pastes
  - SPELL # Comment to disable checks of spelling mistakes # - SPELL # Uncomment to disable checks of spelling mistakes
SHOW_ELAPSED_TIME: true
FILEIO_REPORTER: false
JAVA_CHECKSTYLE_FILTER_REGEX_EXCLUDE: "Generated*"
DART_DARTANALYZER_FILTER_REGEX_EXCLUDE: "test/"
